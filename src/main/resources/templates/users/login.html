<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>로그인</h1>

<form th:action="@{/users/login}" method="post" th:object="${loginRequestDto}">
    <div th:if="${errorMessage}" style="background:#ffe6e6; color:#cc0000; padding:10px; margin-bottom:10px; border:1px solid #cc0000;">
        <span th:text="${errorMessage}"></span>
    </div>

    <div>
        <label>아이디</label>
        <input type="text" th:field="*{username}">
    </div>

    <div>
        <label>비밀번호</label>
        <input type="password" th:field="*{password}">
    </div>

    <button type="submit">로그인</button>
</form>
<p>
    <a th:href="@{/users/signup}">회원가입</a>
</p>

</body>
</html>
