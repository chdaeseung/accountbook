<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>거래내역 목록</title>
</head>
<body>
<h1>거래내역 목록</h1>

<div>
    <a th:href="@{/transactions/create}">거래내역 등록</a>
    <a th:href="@{/}">홈으로</a>
    <a th:href="@{/categories}">카테고리 관리</a>
</div>

<table border="1">
    <thead>
    <tr>
        <th>날짜</th>
        <th>유형</th>
        <th>금액</th>
        <th>카테고리</th>
        <th>메모</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(transactions)}">
        <td colspan="5">등록된 거래내역이 없습니다.</td>
    </tr>
    <tr th:each="transaction : ${transactions}">
        <td th:text="${transaction.date}"></td>
        <td th:text="${transaction.type.getDescription()}"></td>
        <td th:text="${transaction.amount}"></td>
        <td th:text="${transaction.category}"></td>
        <td>
            <a th:href="@{/transactions/{id}(id=${transaction.id})}">
                <span th:text="${transaction.memo}"></span>
            </a>
        </td>
    </tr>
    </tbody>
</table>
<!--<a th:href="@{/transactions/{id}(id=${transaction.id})}">-->
<!--    상세보기-->
<!--</a>-->

</body>
</html>
