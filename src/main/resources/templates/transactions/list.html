<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>거래내역 목록</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        div {
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/dashboard}">대시보드</a>
    <a th:href="@{/transactions}">거래내역</a>
    <a th:href="@{/categories}">카테고리 관리</a>
    <a th:href="@{/recurring}">정기 지출 관리</a>
    <a th:href="@{/bank-account}">계좌 관리</a>
</nav>
<form th:action="@{/transactions}" method="get">
    <div>
        <label>시작일</label>
        <input type="date" name="startDate" th:value="${searchDto.startDate}">
    </div>

    <div>
        <label>종료일</label>
        <input type="date" name="endDate" th:value="${searchDto.endDate}">
    </div>

    <div>
        <label>카테고리</label>
        <select name="categoryId">
            <option value="">전체</option>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}"
                    th:selected="${searchDto.categoryId != null and searchDto.categoryId == category.id}">
            </option>
        </select>
    </div>

    <div>
        <label>유형</label>
        <select name="type" id="searchTypeSelect" onchange="toggleSearchExpenseType()">
            <option value="">전체</option>
            <option value="INCOME"
                    th:selected="${searchDto.type != null and searchDto.type.name() == 'INCOME'}">수입</option>
            <option value="EXPENSE"
                    th:selected="${searchDto.type != null and searchDto.type.name() == 'EXPENSE'}">지출</option>
        </select>
    </div>

    <div id="searchExpenseTypeBox">
        <label>지출 성격</label>
        <select name="expenseType">
            <option value="">전체</option>
            <option value="FIXED"
                    th:selected="${searchDto.expenseType != null and searchDto.expenseType.name() == 'FIXED'}">고정지출</option>
            <option value="VARIABLE"
                    th:selected="${searchDto.expenseType != null and searchDto.expenseType.name() == 'VARIABLE'}">변동지출</option>
        </select>
    </div>

    <input type="hidden" name="page" value="0">
    <input type="hidden" name="size" th:value="${searchDto.size}">

    <div></div>
    <button type="submit">검색</button>
    <a th:href="@{/transactions}">초기화</a>
    <div></div>

    <div>
        <a th:href="@{/transactions/create}">거래내역 등록</a>
    </div>
</form>

<hr>

<table border="1">
    <thead>
    <tr>
        <th>날짜</th>
        <th>카테고리</th>
        <th>유형</th>
        <th>금액</th>
        <th>메모</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${transactionPage.content.isEmpty()}">
        <td colspan="5">조회된 거래내역이 없습니다.</td>
    </tr>

    <tr th:each="transaction : ${transactionPage.content}">
        <td th:text="${transaction.date}">날짜</td>
        <td th:text="${transaction.categoryName}">카테고리</td>
        <td>
            <span th:style="${transaction.type.name() == 'INCOME' ? 'color:blue;' : 'color:red;'}"
                  th:text="${transaction.type.name() == 'INCOME' ? '수입' : '지출'}">
                지출
            </span>

            <span th:if="${transaction.type.name() == 'EXPENSE' and transaction.expenseType != null}"
                  th:text="${transaction.expenseType.name() == 'FIXED' ? '(고정)' : '(변동)'}">
                (고정)
            </span>
        </td>
        <td th:text="${#numbers.formatInteger(transaction.amount, 3, 'COMMA')}">금액</td>
        <td>
            <a th:href="@{/transactions/{id}(id=${transaction.id})}"
               th:text="${#strings.isEmpty(transaction.memo) ? '(내용 없음)' : transaction.memo}">
                점심
            </a>
            <span th:if="${transaction.recurring}" style="color:gray;">[정기]</span>
        </td>
    </tr>
    </tbody>
</table>

<hr>

<div style="margin-top: 16px;" th:if="${transactionPage.totalPages > 0}">
    <a th:if="${!transactionPage.first}"
       th:href="@{/transactions(
            page=${transactionPage.number - 1},
            size=${searchDto.size},
            startDate=${searchDto.startDate},
            endDate=${searchDto.endDate},
            categoryId=${searchDto.categoryId},
            type=${searchDto.type},
            expenseType=${searchDto.expenseType}
       )}">
        이전
    </a>

    <span th:each="pageNum : ${#numbers.sequence(0, transactionPage.totalPages - 1)}">
        <a th:if="${pageNum != transactionPage.number}"
           th:href="@{/transactions(
                page=${pageNum},
                size=${searchDto.size},
                startDate=${searchDto.startDate},
                endDate=${searchDto.endDate},
                categoryId=${searchDto.categoryId},
                type=${searchDto.type},
                expenseType=${searchDto.expenseType}
           )}"
           th:text="${pageNum + 1}">
            1
        </a>

        <span th:if="${pageNum == transactionPage.number}"
              th:text="${pageNum + 1}">
            1
        </span>
    </span>

    <a th:if="${!transactionPage.last}"
       th:href="@{/transactions(
            page=${transactionPage.number + 1},
            size=${searchDto.size},
            startDate=${searchDto.startDate},
            endDate=${searchDto.endDate},
            categoryId=${searchDto.categoryId},
            type=${searchDto.type},
            expenseType=${searchDto.expenseType}
       )}">
        다음
    </a>
</div>

<script>
    function toggleSearchExpenseType() {
        const typeSelect = document.getElementById("searchTypeSelect");
        const expenseTypeBox = document.getElementById("searchExpenseTypeBox");

        if (typeSelect.value === "EXPENSE") {
            expenseTypeBox.style.display = "block";
        } else {
            expenseTypeBox.style.display = "none";
        }
    }

    window.onload = function () {
        toggleSearchExpenseType();
    };
</script>

</body>
</html>
