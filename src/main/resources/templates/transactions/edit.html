<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>거래내역 수정</title>
</head>
<body>
<h1>거래내역 수정</h1>

<form th:action="@{/transactions/{id}/edit(id=${transactionId})}"
      th:object="${transaction}"
      method="post">

    <div>
        <label>거래 유형</label>
        <select th:field="*{type}">
            <option value="">선택하세요</option>
            <option th:value="INCOME">수입</option>
            <option th:value="EXPENSE">지출</option>
        </select>
        <div th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
    </div>

    <div>
        <label>금액</label>
        <input type="number" th:field="*{amount}">
        <div th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
    </div>

    <div>
        <label>카테고리</label>
        <select th:field="*{categoryId}">
            <option value="">카테고리 선택</option>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}">
            </option>
        </select>
        <div th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
    </div>

    <div>
        <label>메모</label>
        <input type="text" th:field="*{memo}">
    </div>

    <div>
        <label>날짜</label>
        <input type="date" th:field="*{date}">
        <div th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
    </div>

    <button type="submit">수정 완료</button>
</form>

<a th:href="@{/transactions/{id}(id=${transactionId})}">취소</a>
</body>
</html>
