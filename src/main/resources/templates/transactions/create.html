<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>거래내역 등록</title>
    <style>
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        .modal-backdrop.show {
            display: block;
        }

        .modal-box {
            width: 360px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 120px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .modal-actions {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .field-row {
            margin-bottom: 12px;
        }

        .category-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .error-text {
            color: red;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<h1>거래내역 등록</h1>

<form th:action="@{/transactions}" th:object="${transactionRequestDto}" method="post">
    <div class="field-row">
        <label>날짜</label>
        <label>
            <input type="date" th:field="*{date}">
        </label>
    </div>

    <div class="field-row">
        <label>카테고리</label>
        <div class="category-row">
            <label for="categorySelect"></label>
            <select th:field="*{categoryId}" id="categorySelect">
                <option value="">카테고리 선택</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>
            </select>

            <button type="button" onclick="openCategoryModal()">+ 카테고리 추가</button>
        </div>
    </div>

    <div class="field-row">
        <label>유형</label>
        <select th:field="*{type}">
            <option value="">유형 선택</option>
            <option value="INCOME">수입</option>
            <option value="EXPENSE">지출</option>
        </select>
    </div>

    <div>
        <label>지출 성격</label>
        <select th:field="*{expenseType}">
            <option value="">선택</option>
            <option value="FIXED">고정지출</option>
            <option value="VARIABLE">변동지출</option>
        </select>
    </div>

    <div class="field-row">
        <label>금액</label>
        <input type="number" th:field="*{amount}">
    </div>

    <div class="field-row">
        <label>내용</label>
        <input type="text" th:field="*{memo}">
    </div>

    <button type="submit">등록</button>
    <a th:href="@{/dashboard}">대시보드</a>
</form>

<div id="categoryModal" class="modal-backdrop">
    <div class="modal-box">
        <div class="modal-title">카테고리 추가</div>

        <div>
            <label for="newCategoryName">카테고리명</label>
            <input type="text" id="newCategoryName" placeholder="예: 교통비">
            <div id="categoryError" class="error-text"></div>
        </div>

        <div class="modal-actions">
            <button type="button" onclick="closeCategoryModal()">취소</button>
            <button type="button" onclick="saveCategory()">저장</button>
        </div>
    </div>
</div>

<script>
    function openCategoryModal() {
        document.getElementById("categoryModal").classList.add("show");
        document.getElementById("newCategoryName").value = "";
        document.getElementById("categoryError").innerText = "";
        document.getElementById("newCategoryName").focus();
    }

    function closeCategoryModal() {
        document.getElementById("categoryModal").classList.remove("show");
    }

    async function saveCategory() {
        const nameInput = document.getElementById("newCategoryName");
        const errorBox = document.getElementById("categoryError");
        const categorySelect = document.getElementById("categorySelect");

        const name = nameInput.value.trim();
        errorBox.innerText = "";

        if (!name) {
            errorBox.innerText = "카테고리명을 입력해주세요.";
            return;
        }

        try {
            const response = await fetch("/api/categories", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name: name })
            });

            if (!response.ok) {
                const errorText = await response.text();
                errorBox.innerText = errorText || "카테고리 저장에 실패했습니다.";
                return;
            }

            const data = await response.json();

            const option = document.createElement("option");
            option.value = data.id;
            option.text = data.name;
            option.selected = true;

            categorySelect.appendChild(option);
            categorySelect.value = data.id;

            closeCategoryModal();
        } catch (e) {
            errorBox.innerText = "카테고리 저장 중 오류가 발생했습니다.";
        }
    }

    window.addEventListener("click", function(event) {
        const modal = document.getElementById("categoryModal");
        if (event.target === modal) {
            closeCategoryModal();
        }
    });
</script>

</body>
</html>
