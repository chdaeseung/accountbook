<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>거래 상세</title>
</head>
<body>

<h1>거래 상세</h1>

<table border="1">
    <tr>
        <th>날짜</th>
        <td th:text="${transaction.date}">날짜</td>
    </tr>
    <tr>
        <th>카테고리</th>
        <td th:text="${transaction.categoryName}">카테고리</td>
    </tr>
    <tr>
        <th>유형</th>
        <td th:text="${transaction.type.name() == 'INCOME' ? '수입' : '지출'}">지출</td>
    </tr>
    <tr>
        <th>금액</th>
        <td th:text="${#numbers.formatInteger(transaction.amount, 3, 'COMMA')}">금액</td>
    </tr>
    <tr>
        <th>메모</th>
        <td th:href="@{/transactions/{id}(id=${transaction.id})}"
           th:text="${transaction.memo != null and !#strings.isEmpty(transaction.memo) ? transaction.memo : '(내용 없음)'}">
            메모
        </td>
    </tr>
</table>

<div style="margin-top: 20px;">
    <a th:href="@{/transactions}">목록으로</a>
    <a th:href="@{/dashboard}">대시보드</a>
    <a th:href="@{/transactions/{id}/edit(id=${transaction.id})}">수정</a>

</div>
<form th:action="@{/transactions/{id}/delete(id=${transaction.id})}" method="post"
      onsubmit="return confirm('정말 삭제하시겠습니까?');">
    <button type="submit">삭제</button>
</form>

</body>
</html>
