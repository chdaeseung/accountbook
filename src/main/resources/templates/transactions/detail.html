<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>거래 상세</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/dashboard}">대시보드</a>
    <a th:href="@{/transactions}">거래내역</a>
    <a th:href="@{/categories}">카테고리 관리</a>
    <a th:href="@{/recurring}">정기 지출 관리</a>
    <a th:href="@{/bank-account}">계좌 관리</a>
</nav>
<table border="1">
    <tr>
        <th>날짜</th>
        <td th:text="${transaction.date}">날짜</td>
    </tr>
    <tr>
        <th>카테고리</th>
        <td th:text="${transaction.categoryName}">카테고리</td>
    </tr>
    <tr>
        <th>유형</th>
        <td>
            <span th:text="${transaction.type.name() == 'INCOME' ? '수입' : '지출'}">지출</span>
            <span th:if="${transaction.type.name() == 'EXPENSE' and transaction.expenseType != null}"
                  th:text="${transaction.expenseType.name() == 'FIXED' ? '(고정지출)' : '(변동지출)'}">
                (고정지출)
            </span>
        </td>
    </tr>
    <tr>
        <th>계좌</th>
        <td th:text="${transaction.bankAccountName != null ? transaction.bankAccountName : '선택 안 함'}"></td>
    </tr>
    <tr>
        <th>금액</th>
        <td th:text="${#numbers.formatInteger(transaction.amount, 3, 'COMMA')}">금액</td>
    </tr>
    <tr>
        <th>메모</th>
        <td th:href="@{/transactions/{id}(id=${transaction.id})}"
           th:text="${transaction.memo != null and !#strings.isEmpty(transaction.memo) ? transaction.memo : '(내용 없음)'}">
            메모
        </td>
    </tr>
</table>

<div style="margin-top: 20px;">
    <a th:href="@{/transactions/{id}/update(id=${transaction.id})}">수정</a>

    <form th:action="@{/transactions/{id}/delete(id=${transaction.id})}"
          method="post"
          style="display:inline;"
          onsubmit="return confirm('정말 삭제하시겠습니까?');">
        <button type="submit">삭제</button>
    </form>

    <a th:href="@{/transactions}">목록으로</a>
    <a th:href="@{/dashboard}">대시보드로</a>
</div>

</body>
</html>
