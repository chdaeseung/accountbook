<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>거래내역 수정</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/dashboard}">대시보드</a>
    <a th:href="@{/transactions}">거래내역</a>
    <a th:href="@{/categories}">카테고리 관리</a>
    <a th:href="@{/recurring}">정기 지출 관리</a>
    <a th:href="@{/bank-account}">계좌 관리</a>
</nav>
<form th:action="@{/transactions/{id}/update(id=${transactionId})}"
      th:object="${transaction}"
      method="post">

    <div>
        <label>날짜</label>
        <input type="date" th:field="*{date}">
    </div>

    <div>
        <label>카테고리</label>
        <select th:field="*{categoryId}">
            <option value="">카테고리 선택</option>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}">
            </option>
        </select>
    </div>

    <div>
        <label>계좌 선택</label>
        <select th:field="*{bankAccountId}">
            <option value="">선택 안 함</option>
            <option th:each="account : ${bankAccounts}"
                    th:value="${account.id}"
                    th:text="${account.accountName}">
            </option>
        </select>
    </div>

    <div>
        <label>유형</label>
        <select th:field="*{type}" id="typeSelect" onchange="toggleExpenseType()">
            <option value="INCOME">수입</option>
            <option value="EXPENSE">지출</option>
        </select>
    </div>

    <div>
        <label>금액</label>
        <input type="number" th:field="*{amount}">
    </div>

    <div>
        <label>메모</label>
        <input type="text" th:field="*{memo}">
    </div>

    <button type="submit">수정 완료</button>
    <a th:href="@{/transactions/{id}(id=${transactionId})}">취소</a>
</form>

<script>
    function toggleExpenseType() {
        const typeSelect = document.getElementById("typeSelect");
        const expenseTypeBox = document.getElementById("expenseTypeBox");

        if (typeSelect.value === "EXPENSE") {
            expenseTypeBox.style.display = "block";
        } else {
            expenseTypeBox.style.display = "none";
        }
    }

    window.onload = function () {
        toggleExpenseType();
    };
</script>

</body>
</html>
