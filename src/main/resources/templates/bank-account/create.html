<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계좌 등록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/dashboard}">대시보드</a>
    <a th:href="@{/transactions}">거래내역</a>
    <a th:href="@{/categories}">카테고리 관리</a>
    <a th:href="@{/recurring}">정기 지출 관리</a>
    <a th:href="@{/bank-account}">계좌 관리</a>
</nav>

<h1>계좌 등록</h1>

<form th:action="@{/bank-account/create}" th:object="${bankAccountRequestDto}" method="post">
    <div>
        <label>은행명</label>
        <input type="text" th:field="*{bankName}">
        <div th:if="${#fields.hasErrors('bankName')}" th:errors="*{bankName}"></div>
    </div>

    <div>
        <label>계좌 번호</label>
        <input type="text" th:field="*{accountNumber}">
        <div th:if="${#fields.hasErrors('accountNumber')}" th:errors="*{accountNumber}"></div>
    </div>

    <div>
        <label>잔액</label>
        <input type="number" th:field="*{balance}">
        <div th:if="${#fields.hasErrors('balance')}" th:errors="*{balance}"></div>
    </div>

    <div>
        <label>계좌 종류</label>
        <select th:field="*{type}">
            <option value="">선택하세요</option>
            <option th:each="type : ${types}"
                    th:value="${type}"
                    th:text="${type.getDescription()}">
            </option>
        </select>
        <div th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
    </div>

    <div>
        <label>사용 여부</label>
        <input type="checkbox" th:field="*{used}">
    </div>

    <div>
        <button type="submit">등록</button>
        <a th:href="@{/bank-account}">목록</a>
    </div>
</form>

</body>
</html>
