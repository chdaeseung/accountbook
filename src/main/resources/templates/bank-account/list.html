<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계좌 목록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/dashboard}">대시보드</a>
    <a th:href="@{/transactions}">거래내역</a>
    <a th:href="@{/categories}">카테고리 관리</a>
    <a th:href="@{/recurring}">정기 지출 관리</a>
    <a th:href="@{/bank-account}">계좌 관리</a>
</nav>

<h1>계좌 목록</h1>

<hr>

<p>
    <a th:href="@{/bank-account/create}">계좌 등록</a>
    <a th:href="@{/transfers/create}">계좌 이체</a>
</p>

<table border="1">
    <thead>
    <tr>
        <th>은행명</th>
        <th>계좌명</th>
        <th>잔액</th>
        <th>종류</th>
        <th>상태</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(bankAccounts)}">
        <td colspan="5">등록된 계좌가 없습니다.</td>
    </tr>
    <tr th:each="account : ${bankAccounts}">
        <td th:text="${account.bankName}"></td>
        <td>
            <a th:href="@{/bank-account/{id}(id=${account.id})}"
               th:text="${account.getAccountName}"></a>
        </td>
        <td th:text="${#numbers.formatInteger(account.balance, 3, 'COMMA')} + '원'"></td>
        <td th:text="${account.typeLabel}"></td>
        <td th:text="${account.isUsed() ? '사용중' : '중지'}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
