<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>계좌 상세</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/dashboard}">대시보드</a>
    <a th:href="@{/transactions}">거래내역</a>
    <a th:href="@{/categories}">카테고리 관리</a>
    <a th:href="@{/recurring}">정기 지출 관리</a>
    <a th:href="@{/bank-account}">계좌 관리</a>
</nav>
<h1>계좌 상세</h1>

<table border="1">
    <tr>
        <th>은행명</th>
        <td th:text="${bankAccount.bankName}"></td>
    </tr>
    <tr>
        <th>계좌명</th>
        <td th:text="${bankAccount.getAccountName}"></td>
    </tr>
    <tr>
        <th>잔액</th>
        <td th:text="${#numbers.formatInteger(bankAccount.balance, 3, 'COMMA')} + '원'"></td>
    </tr>
    <tr>
        <th>종류</th>
        <td th:text="${bankAccount.typeLabel}"></td>
    </tr>
    <tr>
        <th>상태</th>
        <td th:text="${bankAccount.isUsed() ? '사용중' : '중지'}"></td>
    </tr>
</table>

<p>
    <a th:href="@{/bank-account/{id}/update(id=${bankAccount.id})}">수정</a>
    <a th:href="@{/bank-account}">목록</a>
</p>

<form th:action="@{/bank-account/{id}/delete(id=${bankAccount.id})}" method="post">
    <button type="submit">삭제</button>
</form>

</body>
</html>
