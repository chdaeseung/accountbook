<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>가계부 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<nav>
    <a th:href="@{/dashboard}">대시보드</a>
    <a th:href="@{/transactions}">거래내역</a>
    <a th:href="@{/categories}">카테고리 관리</a>
    <a th:href="@{/recurring}">정기 지출 관리</a>
    <a th:href="@{/bank-account}">계좌 관리</a>
</nav>

<form th:action="@{/users/logout}" method="post">
    <button type="submit">로그아웃</button>
</form>

<hr>

<h2>월별 대시보드</h2>

<div>
    <a th:href="@{/dashboard(year=${prevYear}, month=${prevMonth})}">이전 달</a>
    <strong th:text="|${dashboard.year}년 ${dashboard.month}월|"></strong>
    <a th:href="@{/dashboard(year=${nextYear}, month=${nextMonth})}">다음 달</a>
</div>

<hr>

<div class="dashboard-main">
    <div class="dashboard-container">
        <div class="dashboard-container-left">
            <div>
                <h2>요약 정보</h2>
                <p>총 수입: <span th:text="${#numbers.formatInteger(dashboard.totalIncome, 3, 'COMMA')}"></span>원</p>
                <p>총 지출: <span th:text="${#numbers.formatInteger(dashboard.totalExpense, 3, 'COMMA')}"></span>원</p>
                <p>현재 잔액: <span th:text="${#numbers.formatInteger(dashboard.balance, 3, 'COMMA')}"></span>원</p>
            </div>
            <div class="dashboard-container-left-expense">
                <table border="1">
                    <thead>
                    <tr>
                        <th>순위</th>
                        <th>카테고리</th>
                        <th>지출 금액</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(dashboard.top3CategoriesExpense)}">
                        <td colspan="3">이번 달 지출 데이터가 없습니다.</td>
                    </tr>
                    <tr th:each="category, stat : ${dashboard.top3CategoriesExpense}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${category.categoryName}"></td>
                        <td th:text="${#numbers.formatInteger(category.amount, 3, 'COMMA')} + '원'"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div>
            <h2 th:text="|${dashboard.year}년 ${dashboard.month}월 최근 거래 5건|"></h2>

            <table border="1">
                <thead>
                <tr>
                    <th>날짜</th>
                    <th>유형</th>
                    <th>카테고리</th>
                    <th>금액</th>
                    <th>메모</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(dashboard.recentTransactions)}">
                    <td colspan="5">거래내역이 없습니다.</td>
                </tr>
                <tr th:each="transaction : ${dashboard.recentTransactions}">
                    <td th:text="${transaction.date}"></td>
                    <td th:style="${transaction.type.name() == 'INCOME' ? 'color:blue;' : 'color:red;'}"
                        th:text="${transaction.type.name() == 'INCOME' ? '수입' : '지출'}">
                        지출
                    </td>
                    <td th:text="${transaction.category}"></td>
                    <td th:text="${#numbers.formatInteger(transaction.amount, 3, 'COMMA')}"></td>
                    <td class="memo-link">
                        <a th:href="@{/transactions/{id}(id=${transaction.id})}"
                           th:text="${transaction.memo != null and !#strings.isEmpty(transaction.memo) ? transaction.memo : '(내용 없음)'}">
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="dashboard-container-right">
        <h2 th:text="|${dashboard.year}년 ${dashboard.month}월 정기지출 예정 합계|"></h2>
        <p>
            <span th:text="${#numbers.formatInteger(dashboard.monthlyRecurringExpenseTotal, 3, 'COMMA')}"></span>원
        </p>

        <h2>사용중인 정기지출</h2>

        <table border="1">
            <thead>
            <tr>
                <th>메모</th>
                <th>카테고리</th>
                <th>금액</th>
                <th>매월 결제일</th>
                <th>상태</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(dashboard.recurringTransactions)}">
                <td colspan="6">사용중인 정기지출이 없습니다.</td>
            </tr>
            <tr th:each="recurring : ${dashboard.recurringTransactions}">
                <td th:text="${recurring.memo != null and !#strings.isEmpty(recurring.memo) ? recurring.memo : '(내용 없음)'}"></td>
                <td th:text="${recurring.categoryName}"></td>
                <td th:text="${#numbers.formatInteger(recurring.amount, 3, 'COMMA')}"></td>
                <td th:text="|매월 ${recurring.dayOfMonth}일|"></td>
                <td th:text="${recurring.done ? '사용중' : '중지'}"></td>
            </tr>
            </tbody>
        </table>

    </div>
    <div>
        <h2>보유 자산</h2>
        <p>
            총 자산:
            <span th:text="${#numbers.formatInteger(dashboard.totalBankAmount, 3, 'COMMA')}"></span>원
        </p>

        <table border="1">
            <thead>
            <tr>
                <th>은행명</th>
                <th>계좌명</th>
                <th>잔액</th>
                <th>종류</th>
                <th>상태</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(dashboard.bankAccounts)}">
                <td colspan="5">등록된 사용중 계좌가 없습니다.</td>
            </tr>
            <tr th:each="account : ${dashboard.bankAccounts}">
                <td th:text="${account.bankName}"></td>
                <td>
                    <a th:href="@{/bank-account/{id}(id=${account.id})}"
                       th:text="${account.accountNumber}"></a>
                </td>
                <td th:text="${#numbers.formatInteger(account.balance, 3, 'COMMA')} + '원'"></td>
                <td th:text="${account.typeLabel}"></td>
                <td th:text="${account.used ? '사용중' : '중지'}"></td>
            </tr>
            </tbody>
        </table>

        <p>
            <a th:href="@{/bank-account}">계좌 관리로 이동</a>
        </p>

    </div>
</div>

<hr>

</body>
</html>
