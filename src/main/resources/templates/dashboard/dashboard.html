<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>가계부 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="dashboard-top-bar">
    <div class="dashboard-summary-inline">
        <div class="summary-item income">
            <span class="summary-label">총 수입</span>
            <span class="summary-value"
                  th:text="${#numbers.formatInteger(dashboard.totalIncome, 3, 'COMMA')} + '원'"></span>
        </div>

        <div class="summary-item expense">
            <span class="summary-label">총 지출</span>
            <span class="summary-value"
                  th:text="${#numbers.formatInteger(dashboard.totalExpense, 3, 'COMMA')} + '원'"></span>
        </div>

        <div class="summary-item balance">
            <span class="summary-label">잔액</span>
            <span class="summary-value"
                  th:text="${#numbers.formatInteger(dashboard.balance, 3, 'COMMA')} + '원'"></span>
        </div>
    </div>

    <div class="dashboard-month-center">
        <a th:href="@{/dashboard(year=${prevYear}, month=${prevMonth})}" class="month-move-btn">이전 달</a>
        <strong class="month-title" th:text="|${dashboard.year}년 ${dashboard.month}월|"></strong>
        <a th:href="@{/dashboard(year=${nextYear}, month=${nextMonth})}" class="month-move-btn">다음 달</a>
    </div>

    <div class="dashboard-top-right"></div>
</div>

<hr>

<div class="dashboard-main">

    <div class="dashboard-left">

        <div class="top-mini-card-row">
            <div class="dashboard-card mini-card summary-card-compact">
                <h2>요약 정보</h2>
                <p>총 수입: <span th:text="${#numbers.formatInteger(dashboard.totalIncome, 3, 'COMMA')}"></span>원</p>
                <p>총 지출: <span th:text="${#numbers.formatInteger(dashboard.totalExpense, 3, 'COMMA')}"></span>원</p>
                <p>현재 잔액: <span th:text="${#numbers.formatInteger(dashboard.balance, 3, 'COMMA')}"></span>원</p>
            </div>

            <div class="dashboard-card mini-card summary-card-compact">
                <h2>카테고리별 지출 TOP3</h2>
                <table class="dashboard-table">
                    <thead>
                    <tr>
                        <th>순위</th>
                        <th>카테고리</th>
                        <th>지출 금액</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(dashboard.top3CategoriesExpense)}">
                        <td colspan="3">이번 달 지출 데이터가 없습니다.</td>
                    </tr>
                    <tr th:each="category, stat : ${dashboard.top3CategoriesExpense}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${category.categoryName}"></td>
                        <td th:text="${#numbers.formatInteger(category.amount, 3, 'COMMA')} + '원'"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="dashboard-card large-card">
            <div class="card-header">
                <h2>최근 거래 5건</h2>
                <a th:href="@{/transactions}" class="btn-more">더보기</a>
            </div>

            <table class="dashboard-table recent-transaction-table">

                <!-- 🔥 컬럼 폭 지정 -->
                <colgroup>
                    <col class="col-date">
                    <col class="col-type">
                    <col class="col-category">
                    <col class="col-account">
                    <col class="col-amount">
                    <col class="col-memo">
                </colgroup>

                <thead>
                <tr>
                    <th>날짜</th>
                    <th>유형</th>
                    <th>카테고리</th>
                    <th>계좌</th>
                    <th>금액</th>
                    <th>메모</th>
                </tr>
                </thead>

                <tbody>

                <!-- 데이터 없을 때 -->
                <tr th:if="${#lists.isEmpty(dashboard.recentTransactions)}">
                    <td colspan="6">거래내역이 없습니다.</td>
                </tr>

                <!-- 🔥 행 전체 클릭 -->
                <tr th:each="transaction : ${dashboard.recentTransactions}"
                    th:onclick="|location.href='@{/transactions/{id}(id=${transaction.id})}'|"
                    class="clickable-row">

                    <td th:text="${transaction.date}"></td>

                    <td th:classappend="${transaction.type.name() == 'INCOME'} ? 'type-income' : 'type-expense'"
                        th:text="${transaction.type.name() == 'INCOME' ? '수입' : '지출'}">
                    </td>

                    <td th:text="${transaction.category}"></td>

                    <td th:text="${transaction.bankAccountName}"></td>

                    <td th:classappend="${transaction.type.name() == 'INCOME'} ? 'amount-income' : 'amount-expense'"
                        th:text="${#numbers.formatInteger(transaction.amount, 3, 'COMMA')} + '원'">
                    </td>

                    <!-- 🔥 메모 줄임 -->
                    <td th:text="${transaction.memo != null and !#strings.isEmpty(transaction.memo) ? (
            transaction.memo.length() > 10 ? transaction.memo.substring(0, 10) + '...' : transaction.memo)
            : '(내용 없음)'}">
                    </td>

                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <div class="dashboard-right">
        <div class="dashboard-card">
            <h2>보유 자산</h2>
            <p>
                총 자산:
                <span th:text="${#numbers.formatInteger(dashboard.totalBankAmount, 3, 'COMMA')}"></span>원
            </p>

            <table class="dashboard-table">
                <thead>
                <tr>
                    <th>은행명</th>
                    <th>계좌명</th>
                    <th>잔액</th>
                    <th>종류</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(dashboard.bankAccounts)}">
                    <td colspan="5">등록된 사용중 계좌가 없습니다.</td>
                </tr>
                <tr th:each="account : ${dashboard.bankAccounts}">
                    <td th:text="${account.bankName}"></td>
                    <td>
                        <a th:href="@{/bank-account/{id}(id=${account.id})}"
                           th:text="${account.accountName}"></a>
                    </td>
                    <td th:text="${#numbers.formatInteger(account.balance, 3, 'COMMA')} + '원'"></td>
                    <td th:text="${account.typeLabel}"></td>
                    <td th:text="${account.used ? '사용중' : '중지'}"></td>
                </tr>
                </tbody>
            </table>

            <p>
                <a th:href="@{/bank-account}" class="btn-more">계좌 관리로 이동</a>
            </p>
        </div>

        <div class="dashboard-card">
            <h2>정기지출 예정 합계</h2>
            <p class="recurring-total">
                <span th:text="${#numbers.formatInteger(dashboard.monthlyRecurringExpenseTotal, 3, 'COMMA')}"></span>원
            </p>

            <h3>사용중인 정기지출</h3>

            <table class="dashboard-table">
                <thead>
                <tr>
                    <th>메모</th>
                    <th>카테고리</th>
                    <th>금액</th>
                    <th>매월 결제일</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(dashboard.recurringTransactions)}">
                    <td colspan="5">사용중인 정기지출이 없습니다.</td>
                </tr>
                <tr th:each="recurring : ${dashboard.recurringTransactions}">
                    <td th:text="${recurring.memo != null and !#strings.isEmpty(recurring.memo) ? recurring.memo : '(내용 없음)'}"></td>
                    <td th:text="${recurring.categoryName}"></td>
                    <td th:text="${#numbers.formatInteger(recurring.amount, 3, 'COMMA')} + '원'"></td>
                    <td th:text="|매월 ${recurring.dayOfMonth}일|"></td>
                    <td th:text="${recurring.done ? '사용중' : '중지'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<hr>

</body>
</html>
